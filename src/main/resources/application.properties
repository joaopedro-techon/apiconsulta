# Aplicacao
spring.application.name=consultas-operacoes-credito

# Aurora PostgreSQL (compativel com driver PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:consultas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Servidor
server.port=8080

# Virtual Threads (Java 21) para tratar requisições HTTP com alta concorrencia
spring.threads.virtual.enabled=true

# Resilience4j - Circuit Breaker para acesso ao banco (operacoes-db)
# Ajuste fino depende do perfil de carga; estes valores são um bom ponto de partida.
resilience4j.circuitbreaker.instances.operacoes-db.register-health-indicator=true
resilience4j.circuitbreaker.instances.operacoes-db.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.operacoes-db.sliding-window-size=100
resilience4j.circuitbreaker.instances.operacoes-db.minimum-number-of-calls=50
resilience4j.circuitbreaker.instances.operacoes-db.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.operacoes-db.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.operacoes-db.permitted-number-of-calls-in-half-open-state=20
resilience4j.circuitbreaker.instances.operacoes-db.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j - Rate Limiter (operacoes-db): limita requisições por período para proteger o banco.
# limitForPeriod = quantas chamadas por limitRefreshPeriod (ex.: 3000/s).
# timeoutDuration = 0 = falha imediata quando exceder (retorna 429), sem esperar.
resilience4j.ratelimiter.instances.operacoes-db.limit-for-period=3000
resilience4j.ratelimiter.instances.operacoes-db.limit-refresh-period=1s
resilience4j.ratelimiter.instances.operacoes-db.timeout-duration=0s

# Resilience4j - Bulkhead (operacoes-db): limita chamadas concorrentes (evita esgotar pool e threads).
# maxConcurrentCalls deve ser da ordem do connection pool (ex.: Hikari 10) + margem para fila curta.
resilience4j.bulkhead.instances.operacoes-db.max-concurrent-calls=20
resilience4j.bulkhead.instances.operacoes-db.max-wait-duration=0

# =========================
# HTTP OUTBOUND (HTTP Client / Feign)
# =========================
# Fail fast para chamadas a serviços externos.
external.http.pool-name=external-http
external.http.max-connections=200
external.http.pending-acquire-max-count=1000
external.http.connect-timeout-ms=250
external.http.response-timeout-ms=800

# Executor para composição/coordenação de fanout (se houver trabalho bloqueante).
fanout.executor.core-pool-size=32
fanout.executor.max-pool-size=32
fanout.executor.queue-capacity=1000
fanout.executor.keep-alive-seconds=60
fanout.executor.thread-name-prefix=fanout-

# Resilience4j para chamadas HTTP externas (instância external-http)
# Ajuste conforme carga real (atenção: com fanout, a taxa de chamadas externas pode ser multiplicada).
resilience4j.circuitbreaker.instances.external-http.register-health-indicator=true
resilience4j.circuitbreaker.instances.external-http.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.external-http.sliding-window-size=100
resilience4j.circuitbreaker.instances.external-http.minimum-number-of-calls=50
resilience4j.circuitbreaker.instances.external-http.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.external-http.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.external-http.permitted-number-of-calls-in-half-open-state=10
resilience4j.circuitbreaker.instances.external-http.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.ratelimiter.instances.external-http.limit-for-period=10000
resilience4j.ratelimiter.instances.external-http.limit-refresh-period=1s
resilience4j.ratelimiter.instances.external-http.timeout-duration=0s

resilience4j.bulkhead.instances.external-http.max-concurrent-calls=64
resilience4j.bulkhead.instances.external-http.max-wait-duration=0

# =========================
# Spring Cloud OpenFeign
# =========================
spring.cloud.openfeign.okhttp.enabled=true
# Timeouts fail-fast (em ms) para conexao/respota (default para todos os clients).
spring.cloud.openfeign.client.config.default.connectTimeout=250
spring.cloud.openfeign.client.config.default.readTimeout=800

